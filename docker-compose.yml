version: '3.8'

services:
  # ── Spring Boot Backend ──────────────────────────────────────
  backend:
    build: ./backend-spring
    container_name: codesentinel-backend
    ports:
      - "8080:8080"
    environment:
      AI_ENGINE_URL: http://ai-engine:8000
      WEBHOOK_SECRET: codesentinel-dev-secret
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      ai-engine:
        condition: service_healthy
    networks:
      - codesentinel-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/webhook/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Python AI Engine ─────────────────────────────────────────
  ai-engine:
    build: ./ai-engine
    container_name: codesentinel-ai-engine
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: local
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      OWASP_DATA_DIR: data/owasp
    volumes:
      - faiss-data:/app/data/faiss_index
    networks:
      - codesentinel-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── PostgreSQL (optional, for production) ────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: codesentinel-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: codesentinel
      POSTGRES_USER: codesentinel
      POSTGRES_PASSWORD: codesentinel_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - codesentinel-net
    profiles:
      - production

volumes:
  faiss-data:
  postgres-data:

networks:
  codesentinel-net:
    driver: bridge
